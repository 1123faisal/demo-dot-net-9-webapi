name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        # Restoring the test project also restores the API (via ProjectReference)
        run: dotnet restore MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj

      - name: Build
        run: dotnet build MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj --no-restore

      - name: Test
        run: >
          dotnet test MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t myfirstapi ./MyFirstWebApi
