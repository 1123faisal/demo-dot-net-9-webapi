name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: password123
          POSTGRES_USER: admin
          POSTGRES_DB: myfirstapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj

      - name: Build
        run: dotnet build MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
        env:
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: MyFirstWebApi
          Jwt__Audience: MyFirstWebApiUsers
          Jwt__ExpiryHours: "24"
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=myfirstapi_test;Username=admin;Password=password123"
          ConnectionStrings__Redis: "localhost:6379"

  docker-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myfirstapi:latest
