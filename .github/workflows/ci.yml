name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj

      - name: Build
        run: dotnet build MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test MyFirstWebApi.Tests/MyFirstWebApi.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --collect:"XPlat Code Coverage"
        env:
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: MyFirstWebApi
          Jwt__Audience: MyFirstWebApiUsers
          Jwt__ExpiryHours: "24"
          ConnectionStrings__DefaultConnection: "Data Source=test.db"

  docker-push:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myfirstapi:latest
